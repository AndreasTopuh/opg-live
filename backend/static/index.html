<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store">
<meta http-equiv="Pragma" content="no-cache">
<title>OPG-Live · MVP</title>
<style>
  :root{--bg:#f7f4ee;--card:#fff;--ink:#1c1a17;--muted:#6b6459;--line:#e6e0d6;--accent:#7c5cff;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
  header{padding:22px 28px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  header h1{font-size:20px;margin:0;font-weight:700}
  header .tag{font-size:12px;color:var(--muted);border:1px solid var(--line);padding:2px 8px;border-radius:999px}
  main{max-width:1180px;margin:0 auto;padding:24px 28px;display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
  .card h2{font-size:13px;margin:0 0 12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);display:flex;justify-content:space-between;align-items:center;gap:8px}
  .drop{border:2px dashed var(--line);border-radius:12px;padding:28px;text-align:center;color:var(--muted);cursor:pointer;display:block}
  .drop:hover{border-color:var(--accent);color:var(--ink)}
  .finding{display:flex;justify-content:space-between;align-items:center;padding:9px 11px;border:1px solid var(--line);border-radius:10px;margin-bottom:7px;cursor:pointer;transition:.12s}
  .finding:hover,.finding.active{border-color:var(--accent);background:#faf8ff}
  .finding .dx{font-weight:600;font-size:14px}.finding .meta{font-size:12px;color:var(--muted)}
  button{font:inherit;border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px}
  .muted{color:var(--muted);font-size:13px}
  /* interactive stage */
  #stage{position:relative;display:inline-block;width:100%;line-height:0;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
  #stage img.base,#stage img.mask{width:100%;display:block}
  #stage img.mask{position:absolute;inset:0;pointer-events:none}
  /* transparent hotspots: outline + tag only on hover/selection so the baked
     SAM overview stays clean and uncluttered (no always-on boxes/labels). */
  .tbox{position:absolute;border:2px solid transparent;border-radius:3px;cursor:pointer;transition:.1s;background:transparent}
  .tbox:hover{border-color:var(--accent);background:rgba(124,92,255,.12)}
  .tbox.sel{box-shadow:0 0 0 2px #fff,0 0 0 4px var(--accent)}
  .tbox .tag{position:absolute;top:-17px;left:0;font-size:10px;background:#000a;color:#fff;padding:0 4px;border-radius:3px;white-space:nowrap;line-height:1.4;display:none}
  .tbox:hover .tag,.tbox.sel .tag{display:block}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;margin-top:10px}
  .legend span{display:inline-flex;align-items:center;gap:5px}.sw{width:12px;height:12px;border-radius:3px;display:inline-block}
  .metrics{display:flex;gap:18px;flex-wrap:wrap;margin-top:12px;font-size:13px}.metrics b{display:block;font-size:18px}
  .grid2{display:grid;grid-template-columns:2.4fr 1fr;gap:14px;align-items:start;margin-top:8px}
  .hint{font-size:12px;color:var(--muted);margin:8px 0 0}
  .toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .toolbar button{padding:5px 12px;font-size:12px}
  .toolbar button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>
<body>
<header>
  <h1>🦷 OPG-Live</h1>
  <span class="tag">MVP · click a tooth to segment</span>
</header>
<main>
  <div>
    <section class="card">
      <h2>1 · Upload OPG</h2>
      <div class="drop" id="drop">
        <div>Click or drop a panoramic image</div>
      </div>
      <input type="file" id="file" accept="image/*" style="display:none">
      <p class="muted" id="status"></p>
    </section>
    <section class="card" style="margin-top:18px">
      <h2>Findings <button onclick="resetView()">▦ Overview</button></h2>
      <div id="findings"><p class="muted">Upload an OPG to detect lesions.</p></div>
    </section>
  </div>

  <section class="card">
    <h2><span id="vtitle">Viewer</span></h2>
    <div class="grid2">
      <div>
        <div class="toolbar" id="toolbar" style="display:none">
          <button data-mode="overview" onclick="setMode('overview')" class="on">Overview</button>
          <button data-mode="bbox" onclick="setMode('bbox')">BBox</button>
          <button data-mode="mask" onclick="setMode('mask')">Mask</button>
          <button data-mode="hybrid" onclick="setMode('hybrid')">Hybrid</button>
          <button data-mode="hide" onclick="setMode('hide')">Hide</button>
          <button data-mode="tooth" onclick="setMode('tooth')">Per tooth</button>
        </div>
        <div id="stage"><p class="muted" style="line-height:1.5">Result appears here.</p></div>
        <p class="hint" id="hint"></p>
        <div class="legend" id="legend" style="display:none">
          <span><i class="sw" style="background:#00f"></i>Impacted</span>
          <span><i class="sw" style="background:#0ff"></i>Caries</span>
          <span><i class="sw" style="background:#ff0"></i>Periapical</span>
          <span><i class="sw" style="background:#0f0"></i>Deep Caries</span>
          <span><i class="sw" style="background:#999"></i>healthy tooth (click)</span>
        </div>
      </div>
      <div id="side"></div>
    </div>
  </section>
</main>

<script>
const API = "";
const BORDER = {Impacted:"#00f", Caries:"#0ff", "Periapical Lesion":"#ff0", "Deep Caries":"#0f0"};
let D = null;  // analyze result
const $ = s => document.querySelector(s);

// single trigger only (the old <label> wrapper + this .click() opened the
// file dialog twice — that double-prompt broke uploads, esp. on Safari).
$("#drop").onclick = () => $("#file").click();
$("#file").onchange = e => { const f = e.target.files[0]; e.target.value = ""; if(f) upload(f); };
$("#drop").ondragover = e => e.preventDefault();
$("#drop").ondrop = e => { e.preventDefault(); upload(e.dataTransfer.files[0]); };

async function upload(f){
  if(!f) return;
  $("#status").textContent = "⏳ Running YOLOv8 + SAM… (FIRST run loads models 30-90s — please wait, don't re-upload)";
  const fd = new FormData(); fd.append("file", f);
  try{
    const r = await fetch(API+"/api/analyze",{method:"POST",body:fd});
    let d; try{ d = await r.json(); }catch(e){ d={error:"non-JSON (HTTP "+r.status+")"}; }
    if(!r.ok||d.error||!d.teeth){ $("#status").textContent="❌ "+(d.error||d.detail||"HTTP "+r.status); return; }
    D = d;
    $("#status").textContent = `✅ ${d.findings.length} lesion(s), ${d.teeth.length} teeth detected.`;
    renderFindings(); resetView();
  }catch(e){ $("#status").textContent="❌ "+e+" (model still loading? wait & retry once)"; }
}

function renderFindings(){
  $("#findings").innerHTML = D.findings.length
    ? D.findings.map(f=>`<div class="finding" data-det="${f.idx}" onclick="clickDisease(${f.idx})">
        <div><span class="dx">${f.disease}</span><span class="meta"> · ${f.fdi?"FDI "+f.fdi:"?"} · ${f.conf}</span></div>
        <span class="muted">segment →</span></div>`).join("")
    : '<p class="muted">No lesions detected.</p>';
}

// ---- view modes: overview / bbox / mask / hybrid / hide / per-tooth ----
let MODE = "overview";

function resetView(){ setMode("overview"); }   // default after upload + "Overview" button

function setMode(m){
  MODE = m;
  $("#toolbar").style.display = "flex";
  document.querySelectorAll("#toolbar button").forEach(b=>b.classList.toggle("on", b.dataset.mode===m));
  $("#legend").style.display = "flex";

  if(m === "tooth"){
    $("#vtitle").textContent = "Per tooth — hover & click";
    $("#hint").textContent = "Click a tooth → lesion shows its SAM mask + metrics; a healthy tooth shows no mask.";
    $("#stage").innerHTML = `<img class="base" src="${D.views.raw}"><div id="masklayer"></div>${toothBoxes()}`;
    return;
  }
  const v = D.views;
  const src   = {overview:v.overview, bbox:v.bbox, mask:v.mask, hybrid:v.hybrid, hide:v.raw}[m];
  const title = {overview:"Overview — masks + FDI labels", bbox:"BBox arm — boxes only",
                 mask:"Mask arm — SAM masks only", hybrid:"Hybrid arm — box + mask",
                 hide:"Original OPG — overlay hidden"}[m];
  $("#vtitle").textContent = title;
  $("#hint").textContent = m === "hide"
    ? "Segmentation hidden. BBox / Mask / Hybrid show the 3 grounding conditions; Per tooth is interactive."
    : "Whole-image rendering of all detected lesions.";
  $("#side").innerHTML = "";
  $("#stage").innerHTML = `<img class="base" src="${src}">`;
}

// transparent clickable hotspots (per-tooth mode only)
function toothBoxes(){
  const pct = (val,t)=> (val/t*100)+"%";
  return D.teeth.map(t=>{
    const [x0,y0,x1,y1]=t.box, col = t.has_disease?BORDER[t.disease]||"#0f0":"#999";
    const style = `left:${pct(x0,D.width)};top:${pct(y0,D.height)};width:${pct(x1-x0,D.width)};height:${pct(y1-y0,D.height)};`;
    const onclick = t.has_disease?`clickDisease(${t.det_idx})`:`clickHealthy('${t.fdi}')`;
    const tag = `<span class="tag" style="background:${col};color:#000">${t.has_disease?t.disease:'FDI '+t.fdi}</span>`;
    return `<div class="tbox ${t.has_disease?'disease':''}" data-det="${t.det_idx??''}" style="${style}" onclick="${onclick}">${tag}</div>`;
  }).join("");
}

function clickHealthy(fdi){
  $("#vtitle").textContent = `FDI ${fdi} — healthy`;
  $("#side").innerHTML = `<p class="muted">No pathology detected on this tooth — no mask.</p>`;
  document.querySelectorAll(".tbox").forEach(b=>b.classList.remove("sel"));
}

async function clickDisease(detIdx){
  if(MODE !== "tooth") setMode("tooth");   // ensure hotspots + #masklayer exist
  document.querySelectorAll(".finding,.tbox").forEach(b=>b.classList.toggle("sel", b.dataset.det==detIdx));
  document.querySelectorAll(".finding").forEach(b=>b.classList.toggle("active", b.dataset.det==detIdx));
  $("#vtitle").textContent = "Segmenting…";
  try{
    const r = await fetch(API+"/api/segment",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({id:D.id, idx:detIdx})});
    const d = await r.json();
    if(d.error){ $("#vtitle").textContent="Segment failed"; $("#side").innerHTML=`<p class="muted">⚠️ ${d.error}</p>`; return; }
    $("#vtitle").textContent = `${d.disease}${d.fdi?" · FDI "+d.fdi:""}`;
    // overlay the transparent mask in-place over the raw image
    const ml = $("#masklayer");
    if(ml) ml.innerHTML = `<img class="mask" src="${d.overlay}">`;
    $("#side").innerHTML = `
      <img src="${d.crop}" style="width:100%;border-radius:8px;border:1px solid var(--line)">
      <p class="muted" style="text-align:center;margin:4px 0">zoom</p>
      <div class="metrics" style="flex-direction:column;gap:8px">
        <span>tooth (FDI)<b>${d.fdi||"?"}</b></span>
        <span>detector conf<b>${d.conf}</b></span>
        <span>mask area (px)<b>${d.mask_area_px.toLocaleString()}</b></span>
        <span>SAM score<b>${d.sam_score}</b></span>
      </div>`;
  }catch(e){
    $("#vtitle").textContent = "Segment error";
    $("#side").innerHTML = `<p class="muted">⚠️ ${e} — server may still be loading or stopped. Retry once.</p>`;
  }
}
</script>
</body>
</html>
