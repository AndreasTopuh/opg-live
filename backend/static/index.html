<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OPG-Live · MVP</title>
<style>
  :root{--bg:#f7f4ee;--card:#fff;--ink:#1c1a17;--muted:#6b6459;--line:#e6e0d6;--accent:#7c5cff;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
  header{padding:22px 28px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  header h1{font-size:20px;margin:0;font-weight:700}
  header .tag{font-size:12px;color:var(--muted);border:1px solid var(--line);padding:2px 8px;border-radius:999px}
  main{max-width:1150px;margin:0 auto;padding:24px 28px;display:grid;grid-template-columns:340px 1fr;gap:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
  .card h2{font-size:13px;margin:0 0 12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
  .drop{border:2px dashed var(--line);border-radius:12px;padding:30px;text-align:center;color:var(--muted);cursor:pointer}
  .drop:hover{border-color:var(--accent);color:var(--ink)}
  img.result{width:100%;border-radius:10px;border:1px solid var(--line);display:block}
  .finding{display:flex;justify-content:space-between;align-items:center;padding:9px 11px;border:1px solid var(--line);border-radius:10px;margin-bottom:7px;cursor:pointer;transition:.12s}
  .finding:hover,.finding.active{border-color:var(--accent);background:#faf8ff}
  .finding .dx{font-weight:600;font-size:14px}.finding .meta{font-size:12px;color:var(--muted)}
  .pill{font-size:11px;padding:2px 8px;border-radius:999px;background:#f0ecff;color:var(--accent)}
  button{font:inherit;border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px}
  button.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .muted{color:var(--muted);font-size:13px}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;margin-top:10px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .sw{width:12px;height:12px;border-radius:3px;display:inline-block}
  .metrics{display:flex;gap:18px;flex-wrap:wrap;margin-top:10px;font-size:13px}
  .metrics b{display:block;font-size:18px}
  .grid2{display:grid;grid-template-columns:2fr 1fr;gap:14px;align-items:start}
</style>
</head>
<body>
<header>
  <h1>🦷 OPG-Live</h1>
  <span class="tag">MVP · YOLOv8 detect → SAM Adapter segment</span>
</header>
<main>
  <!-- LEFT: upload + findings -->
  <div>
    <section class="card">
      <h2>1 · Upload OPG</h2>
      <label class="drop" id="drop">
        <input type="file" id="file" accept="image/*" hidden>
        <div>Click or drop a panoramic image</div>
      </label>
      <p class="muted" id="status" style="margin-top:10px"></p>
    </section>

    <section class="card" style="margin-top:18px">
      <h2>Findings <button id="allBtn" onclick="showOverview()">▦ Overview (all)</button></h2>
      <div id="findings"><p class="muted">Upload an OPG to detect lesions.</p></div>
    </section>
  </div>

  <!-- RIGHT: viewer -->
  <section class="card">
    <h2><span id="viewTitle">Overview</span></h2>
    <div id="viewer"><p class="muted">Result appears here.</p></div>
    <div class="legend" id="legend" style="display:none">
      <span><i class="sw" style="background:#00f"></i>Impacted</span>
      <span><i class="sw" style="background:#0ff"></i>Caries</span>
      <span><i class="sw" style="background:#ff0"></i>Periapical</span>
      <span><i class="sw" style="background:#0f0"></i>Deep Caries</span>
    </div>
  </section>
</main>

<script>
const API = "";
let lastId = null, overviewSrc = null, findings = [];
const $ = s => document.querySelector(s);

$("#drop").onclick = () => $("#file").click();
$("#file").onchange = e => upload(e.target.files[0]);
$("#drop").ondragover = e => e.preventDefault();
$("#drop").ondrop = e => { e.preventDefault(); upload(e.dataTransfer.files[0]); };

async function upload(f){
  if(!f) return;
  $("#status").textContent = "⏳ Running YOLOv8 + SAM adapter… (FIRST run loads models, can take 30-90s — please wait, don't re-upload)";
  const fd = new FormData(); fd.append("file", f);
  try{
    const r = await fetch(API+"/api/analyze",{method:"POST",body:fd});
    let d;
    try { d = await r.json(); } catch(e){ d = {error:"non-JSON response (HTTP "+r.status+")"}; }
    if(!r.ok){ $("#status").textContent = "❌ HTTP "+r.status+" — "+(d.error||d.detail||JSON.stringify(d)); return; }
    if(d.error){ $("#status").textContent = "❌ "+d.error; return; }
    if(!d.findings){ $("#status").textContent = "❌ unexpected response: "+JSON.stringify(d).slice(0,200); return; }
    lastId = d.id; overviewSrc = d.overview; findings = d.findings;
    $("#status").textContent = `✅ ${d.findings.length} lesion(s) detected.`;
    renderFindings(); showOverview();
  }catch(e){
    $("#status").textContent = "❌ request failed: "+e+" (model still loading? wait & retry once)";
  }
}

function renderFindings(){
  if(!findings.length){ $("#findings").innerHTML='<p class="muted">No lesions detected.</p>'; return; }
  $("#findings").innerHTML = findings.map(f => `
    <div class="finding" data-idx="${f.idx}" onclick="segment(${f.idx})">
      <div><span class="dx">${f.disease}</span>
        <span class="meta"> · ${f.fdi ? "FDI "+f.fdi : "tooth ?"} · ${f.conf}</span></div>
      <span class="pill">segment →</span>
    </div>`).join("");
}

function showOverview(){
  document.querySelectorAll(".finding").forEach(x=>x.classList.remove("active"));
  $("#viewTitle").textContent = "Overview — all detections";
  $("#viewer").innerHTML = overviewSrc ? `<img class="result" src="${overviewSrc}">` : '<p class="muted">No result.</p>';
  $("#legend").style.display = overviewSrc ? "flex" : "none";
}

async function segment(idx){
  document.querySelectorAll(".finding").forEach(x=>x.classList.toggle("active", x.dataset.idx==idx));
  $("#viewTitle").textContent = "Segmenting…";
  $("#viewer").innerHTML = '<p class="muted">⏳ rendering mask…</p>';
  const r = await fetch(API+"/api/segment",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:lastId, idx:idx})});
  const d = await r.json();
  if(d.error){ $("#viewer").innerHTML=`<p class="muted">⚠️ ${d.error}</p>`; return; }
  $("#viewTitle").textContent = `${d.disease}${d.fdi?" · FDI "+d.fdi:""}`;
  $("#legend").style.display="none";
  $("#viewer").innerHTML = `
    <div class="grid2">
      <img class="result" src="${d.view}">
      <div><img class="result" src="${d.crop}"><p class="muted" style="text-align:center;margin:6px 0">zoom</p></div>
    </div>
    <div class="metrics">
      <span>diagnosis<b>${d.disease}</b></span>
      <span>tooth (FDI)<b>${d.fdi||"?"}</b></span>
      <span>detector conf<b>${d.conf}</b></span>
      <span>mask area (px)<b>${d.mask_area_px.toLocaleString()}</b></span>
      <span>SAM score<b>${d.sam_score}</b></span>
    </div>`;
}
</script>
</body>
</html>
