<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OPG-Live · MVP</title>
<style>
  :root{--bg:#f7f4ee;--card:#fff;--ink:#1c1a17;--muted:#6b6459;--line:#e6e0d6;--accent:#7c5cff;--cyan:#0bb;--green:#1a9;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
  header{padding:22px 28px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  header h1{font-size:20px;margin:0;font-weight:700}
  header .tag{font-size:12px;color:var(--muted);border:1px solid var(--line);padding:2px 8px;border-radius:999px}
  main{max-width:1100px;margin:0 auto;padding:24px 28px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
  .card h2{font-size:14px;margin:0 0 12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .drop{border:2px dashed var(--line);border-radius:12px;padding:34px;text-align:center;color:var(--muted);cursor:pointer}
  .drop:hover{border-color:var(--accent);color:var(--ink)}
  img.result{width:100%;border-radius:10px;border:1px solid var(--line)}
  .finding{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:.15s}
  .finding:hover{border-color:var(--accent);background:#faf8ff}
  .finding .dx{font-weight:600}
  .finding .meta{font-size:12px;color:var(--muted)}
  .pill{font-size:11px;padding:2px 8px;border-radius:999px;background:#eee;color:#333}
  button{font:inherit;border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 12px;cursor:pointer}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .arms{display:flex;gap:6px;margin:10px 0}
  .arms button.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  pre{background:#1c1a17;color:#e8e3d8;padding:12px;border-radius:10px;overflow:auto;font-size:12px;font-family:ui-monospace,monospace}
  .muted{color:var(--muted);font-size:13px}
  .full{grid-column:1/-1}
  .lfv{border-left:3px solid var(--accent);padding:8px 12px;margin:8px 0;background:#faf8ff;border-radius:0 8px 8px 0}
  .lfv .v{font-weight:600}.lfv .c{font-size:11px;color:var(--accent)}
</style>
</head>
<body>
<header>
  <h1>🦷 OPG-Live</h1>
  <span class="tag">MVP · YOLOv8 → SAM Adapter → GPT-4o</span>
</header>
<main>
  <section class="card">
    <h2>1 · Upload a panoramic radiograph</h2>
    <label class="drop" id="drop">
      <input type="file" id="file" accept="image/*" hidden>
      <div id="dropmsg">Click or drop an OPG image (.png/.jpg)</div>
    </label>
    <p class="muted" id="status" style="margin-top:12px"></p>
  </section>

  <section class="card">
    <h2>2 · Auto-detection overview</h2>
    <div id="overview"><p class="muted">Result appears here after upload.</p></div>
  </section>

  <section class="card full">
    <h2>3 · Findings (click a tooth to explain)</h2>
    <div id="findings"><p class="muted">No findings yet.</p></div>
  </section>

  <section class="card full" id="explainCard" style="display:none">
    <h2>4 · Click-to-explain (grounded, cited)</h2>
    <div class="arms">
      <span class="muted" style="align-self:center">Grounding:</span>
      <button data-arm="bbox">bbox</button>
      <button data-arm="mask">mask</button>
      <button data-arm="hybrid" class="active">hybrid</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <img class="result" id="artifact">
      <div id="explanation"><p class="muted">Pick a finding above.</p></div>
    </div>
  </section>
</main>

<script>
const API = "";  // same origin (served by FastAPI)
let lastId = null, lastIdx = null, arm = "hybrid";
const $ = s => document.querySelector(s);

$("#drop").onclick = () => $("#file").click();
$("#file").onchange = e => upload(e.target.files[0]);
$("#drop").ondragover = e => { e.preventDefault(); };
$("#drop").ondrop = e => { e.preventDefault(); upload(e.dataTransfer.files[0]); };

document.querySelectorAll(".arms button").forEach(b => b.onclick = () => {
  document.querySelectorAll(".arms button").forEach(x => x.classList.remove("active"));
  b.classList.add("active"); arm = b.dataset.arm;
  if (lastIdx !== null) explain(lastIdx);
});

async function upload(f){
  if(!f) return;
  $("#status").textContent = "⏳ Running YOLO + SAM adapter… (first run loads models, ~30-60s)";
  const fd = new FormData(); fd.append("file", f);
  const r = await fetch(API+"/api/analyze", {method:"POST", body:fd});
  const d = await r.json();
  if(d.error){ $("#status").textContent = "❌ "+d.error; return; }
  lastId = d.id;
  $("#status").textContent = `✅ ${d.findings.length} finding(s) detected.`;
  $("#overview").innerHTML = `<img class="result" src="${d.overview}">`;
  renderFindings(d.findings);
}

function renderFindings(fs){
  if(!fs.length){ $("#findings").innerHTML = '<p class="muted">No lesions detected.</p>'; return; }
  $("#findings").innerHTML = fs.map(f => `
    <div class="finding" onclick="explain(${f.idx})">
      <div><span class="dx">${f.disease}</span>
        <span class="meta"> · ${f.fdi ? "FDI "+f.fdi : "tooth ?"} · conf ${f.conf}</span></div>
      <span class="pill">explain →</span>
    </div>`).join("");
}

async function explain(idx){
  lastIdx = idx;
  $("#explainCard").style.display = "block";
  $("#explanation").innerHTML = '<p class="muted">⏳ Asking GPT-4o (grounded + RAG)…</p>';
  const r = await fetch(API+"/api/explain", {method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:lastId, idx:idx, arm:arm})});
  const d = await r.json();
  if(d.artifact) $("#artifact").src = d.artifact;
  if(d.findings_json && d.findings_json.findings){
    $("#explanation").innerHTML = d.findings_json.findings.map(x => `
      <div class="lfv"><div class="v">${x.field}: ${x.value}</div>
      <div class="c">cite: ${(x.citations||[]).join(", ")} · conf ${x.confidence??""}</div></div>`).join("")
      + `<p class="muted">retrieved: ${(d.retrieved||[]).join(", ")}</p>`;
  } else if(d.error){
    $("#explanation").innerHTML = `<p class="muted">⚠️ ${d.error}</p>`
      + (d.raw ? `<pre>${(d.raw||"").slice(0,800)}</pre>` : "");
  }
}
</script>
</body>
</html>
